name: Test installation

on:
  pull_request:
    branches: [ '**' ]
  push:
    branches: [ master ]

jobs:
  smoke-test:
    runs-on: ubuntu-24.04
    strategy:
      matrix:
        python-version: ['3.8', '3.9', '3.10', '3.11', '3.12']
      fail-fast: false

    steps:
    - uses: actions/checkout@v6
      with:
        fetch-depth: 0

    - uses: astral-sh/setup-uv@v5

    - name: Install ali-bot and alibuild
      run: >-
        uv tool install
        --python ${{ matrix.python-version }}
        'ali-bot[ci] @ git+https://github.com/alisw/ali-bot@${{ github.sha }}'
        --with alibuild

    - name: Verify installation
      run: |
        set-github-status --help
        alibuild version
